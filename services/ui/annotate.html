<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cogent — Annotate</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>

<nav class="topbar">
  <a class="topbar-brand" href="/">⚙ Cogent</a>
  <span style="color:rgba(255,255,255,0.6);font-size:0.875rem">Human annotation</span>
</nav>

<div class="main" style="max-width:700px;margin:0 auto">
  <a class="back-link" id="back-link" href="/">← Back to trace</a>

  <div class="card">
    <div class="card-title">Review this response</div>
    <div id="span-meta" style="font-size:0.875rem;color:#718096;margin-bottom:1rem"></div>

    <div style="margin-bottom:0.75rem">
      <div style="font-size:0.75rem;font-weight:600;text-transform:uppercase;color:#718096;margin-bottom:0.25rem">Prompt</div>
      <div class="preview-box" id="prompt-box"></div>
      <button class="btn btn-outline" style="font-size:0.75rem;margin-top:0.25rem"
        id="prompt-load-btn" onclick="lazyLoadPayload(spanId,'prompt',document.getElementById('prompt-box'),this)">Load full</button>
    </div>

    <div style="margin-bottom:1rem">
      <div style="font-size:0.75rem;font-weight:600;text-transform:uppercase;color:#718096;margin-bottom:0.25rem">Completion</div>
      <div class="preview-box" id="completion-box"></div>
      <button class="btn btn-outline" style="font-size:0.75rem;margin-top:0.25rem"
        id="completion-load-btn" onclick="lazyLoadPayload(spanId,'completion',document.getElementById('completion-box'),this)">Load full</button>
    </div>
  </div>

  <div class="card" id="form-card">
    <div class="card-title">Your assessment</div>
    <form id="annot-form">
      <div class="form-group">
        <label>Score: <strong id="score-display">5</strong>/10</label>
        <input type="range" id="score-range" min="0" max="10" value="5"
          oninput="document.getElementById('score-display').textContent=this.value">
      </div>
      <div class="form-group">
        <label>Label</label>
        <div style="display:flex;gap:1rem;margin-top:0.25rem">
          <label style="display:flex;align-items:center;gap:0.375rem;font-weight:400;cursor:pointer">
            <input type="radio" name="label" value="good" required> Good
          </label>
          <label style="display:flex;align-items:center;gap:0.375rem;font-weight:400;cursor:pointer">
            <input type="radio" name="label" value="acceptable"> Acceptable
          </label>
          <label style="display:flex;align-items:center;gap:0.375rem;font-weight:400;cursor:pointer">
            <input type="radio" name="label" value="bad"> Bad
          </label>
        </div>
      </div>
      <div class="form-group">
        <label for="justification">Justification <span style="color:#718096;font-weight:400">(min 20 characters)</span></label>
        <textarea id="justification" minlength="20" required
          placeholder="Explain your assessment — cite specific parts of the response..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Submit annotation</button>
    </form>
    <div id="success-msg" style="display:none" class="alert-success" style="margin-top:1rem"></div>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
const hash = location.hash.slice(1);
const [spanId, traceId] = hash.split(',');
if (traceId) document.getElementById('back-link').href = 'trace.html#' + traceId;

async function loadSpan() {
  const spans = await fetchJSON('/api/traces/' + traceId);
  const span = spans.find(s => s.span_id === spanId);
  if (!span) return;

  document.getElementById('span-meta').innerHTML =
    `Agent: <strong>${span.agent_name}</strong> &nbsp;·&nbsp; Model: <strong>${span.model || '—'}</strong> &nbsp;·&nbsp; ${new Date(span.start_time * 1000).toLocaleString()}`;

  const promptBox = document.getElementById('prompt-box');
  const completionBox = document.getElementById('completion-box');
  promptBox.textContent = span.prompt_preview || '(no preview)';
  completionBox.textContent = span.completion_preview || '(no preview)';
  if (!span.prompt_ref) document.getElementById('prompt-load-btn').style.display = 'none';
  if (!span.completion_ref) document.getElementById('completion-load-btn').style.display = 'none';
}

document.getElementById('annot-form').onsubmit = async e => {
  e.preventDefault();
  const justification = document.getElementById('justification').value.trim();
  if (justification.length < 20) { alert('Justification must be at least 20 characters.'); return; }
  const label = document.querySelector('input[name="label"]:checked')?.value;
  if (!label) { alert('Please select a label.'); return; }
  const score = parseInt(document.getElementById('score-range').value) / 10;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    await fetchJSON('/api/annotate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ span_id: spanId, trace_id: traceId, score, label, justification }),
    });
    document.getElementById('form-card').style.display = 'none';
    const msg = document.getElementById('success-msg');
    msg.innerHTML = `Your annotation has been recorded. <a href="trace.html#${traceId}">← Back to trace</a>`;
    msg.style.display = 'block';
  } catch (err) {
    alert('Error submitting annotation: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Submit annotation';
  }
};

if (spanId && traceId) loadSpan().catch(console.error);
</script>
</body>
</html>
